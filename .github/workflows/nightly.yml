name: Nagel Law — Nightly Expense Automation

on:
  schedule:
    - cron: '0 1 * * *'   # 7:00 PM CST = 01:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'normal'
        type: choice
        options:
          - normal
          - diagnostic

jobs:
  run-automation:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # allows the job to push data.json back to the repo

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            google-api-python-client \
            google-auth \
            openpyxl \
            anthropic \
            pillow

      - name: Run diagnostic (if selected)
        if: ${{ github.event.inputs.mode == 'diagnostic' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          DRIVE_ROOT_FOLDER_ID:    ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
        run: python nagel_diagnostic.py

      - name: Run expense automation (normal mode)
        if: ${{ github.event.inputs.mode != 'diagnostic' }}
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
          ANTHROPIC_API_KEY:       ${{ secrets.ANTHROPIC_API_KEY }}
          DRIVE_ROOT_FOLDER_ID:    ${{ secrets.DRIVE_ROOT_FOLDER_ID }}
          SMTP_USER:               ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:           ${{ secrets.SMTP_PASSWORD }}
          SUMMARY_EMAIL:           andres@nagellaw.com
        run: python nagel_automation.py

      - name: Commit and push data.json to repo
        if: ${{ github.event.inputs.mode != 'diagnostic' }}
        run: |
          git config user.name  "Nagel Automation"
          git config user.email "automation@nagellaw.com"
          git add data.json suppliers.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Auto-update portal data $(date +'%Y-%m-%d %H:%M')"
          git push
